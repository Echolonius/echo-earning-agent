name: earning-agent

# Runs on GitHub's servers — alive when the home computer is off.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write             # so the run can commit status.md / history.jsonl

concurrency:
  group: earning-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run agent
        env:
          SUPERTEAM_API_KEY: ${{ secrets.SUPERTEAM_API_KEY }}
        run: node agent.mjs

      - name: Commit status
        run: |
          git config user.name "echo-earning-agent"
          git config user.email "sonicrocks150@gmail.com"
          git add -A
          git diff --staged --quiet || git commit -m "status @ $(date -u +%FT%TZ)"
          git push
